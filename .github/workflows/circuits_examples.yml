name: Real Examples

on:
  push:
    branches:
      - main
      - next

jobs:
  test-examples:
    if: github.event.pull_request.draft == false
    name: Run Example Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - bitcoin_signature
          - bitcoin_ecdsa_threshold
          - ecc_ops
          - hybrid_mt
          - poseidon
          - sha_preimage
          - native_gadget
          - cred_full
          - cred_enrollment
          - cred_property

    steps:
      - name: Add github.com credentials to netrc
        uses: extractions/netrc@c3879108aae6b4ed5c4eb60854ae04f06d2f2f68
        with:
          machine: github.com
          username: ${{ secrets.GH_USERNAME }}
          password: ${{ secrets.GH_PASSWORD }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: 'Install rust-toolchain.toml'
        run: rustup toolchain install
      - name: Restore Cargo Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Create directory
        run: mkdir -p ./examples/assets
      - name: Download SRS
        run: curl -L -o ./examples/assets/bls_filecoin_2p19 https://midnight-s3-fileshare-dev-eu-west-1.s3.eu-west-1.amazonaws.com/bls_filecoin_2p19

      - name: Run example ${{ matrix.example }}
        run: cargo run --release -p midnight-zk-stdlib --example ${{ matrix.example }}

      # Save the Cargo Cache
      - name: Save Cargo Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
