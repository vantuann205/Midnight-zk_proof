version: 2

updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "cargo"
    directory: "/"
    registries: "*"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 7
